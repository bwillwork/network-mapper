<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Network Mapper</title>
</head>
<body>
<div class="container py-4 px-3 mx-auto">
    <div class="row">
        <div class="col">
            <h1>D3 Network Graph</h1>
        </div>
    </div>
    <div class="row mt-2">
        <div id="graph" class="col p-0 m-2"></div>
    </div>
    <div class="row mt-2">
        <div class="col">
            <label for="is-directed-input">Is a directed network: </label>
            <input id="is-directed-input" type="checkbox" />
        </div>
        <div class="col">
            <label for="show-node-labels-input">Show Node Labels: </label>
            <input id="show-node-labels-input" type="checkbox" />
        </div>
        <div class="col">
            <label for="distance-factor-input">Edge Distance: </label>
            <input id="distance-factor-input" type="range" style="color: #222"/>
        </div>
    </div>
    <div class="row mt-2">
        <div class="col">
            <label for="node-color-input">Node Colors: </label>
            <input id="node-color-input" class="w-25" type="color"/>
        </div>
        <div class="col">
            <label for="edge-color-input">Edge Colors: </label>
            <input id="edge-color-input" class="w-25" type="color" />
        </div>
        <div class="col">
            <label for="background-color-input">Background Color: </label>
            <input id="background-color-input" class="w-25" type="color" />
        </div>
    </div>
    <div class="row mt-2">
        <div class="col">
            <button id="download-btn" class="btn btn-dark">Download Network (PNG)</button>
        </div>
    </div>
    <div class="row mt-2">
        <div class="col">
            <ul class="nav nav-underline justify-content-center" id="myTab" role="tablist">
                <li class="nav-item w-25" role="presentation">
                    <button class="nav-link active w-100" id="link-tab" data-bs-toggle="tab" data-bs-target="#link-tab-pane" type="button" role="tab" aria-controls="home-tab-pane" aria-selected="true">
                        Create With Controls
                    </button>
                </li>
                <li class="nav-item w-25" role="presentation">
                    <button class="nav-link w-100" id="text-tab" data-bs-toggle="tab" data-bs-target="#text-tab-pane" type="button" role="tab" aria-controls="profile-tab-pane" aria-selected="false">
                        Create Using JSON
                    </button>
                </li>
            </ul>
            <div class="tab-content mt-4" id="myTabContent">

                <!-- Link -->
                <div class="tab-pane fade show active justify-content-center" id="link-tab-pane" role="tabpanel" aria-labelledby="home-tab" tabindex="0">

                    <div class="d-flex justify-content-between">
                        <div class="">
                            <!-- Nodes -->
                            <h2>Nodes</h2>
                            <div id="nodes"></div>
                            <div class="d-flex">
                                <div class="mb-3">
                                    <label class="form-label" for="node-id">Node Id: </label>
                                    <input id="node-id" type="number" class="form-control"/>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="node-name">Node Name: </label>
                                    <input id="node-name" type="text" class="form-control"/>
                                </div>
                            </div>
                            <button id="add-node-btn" class="btn btn-black">Add Node</button>
                        </div>
                        <div class="">
                            <!-- Edges -->
                            <h2>Edges</h2>
                            <div id="edges" class="container"></div>
                            <div class="d-flex">
                                <div class="mb-3">
                                    <label class="form-label" for="from-id">From: </label>
                                    <input id="from-id" type="number" class="form-control"/>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="to-id">To: </label>
                                    <input id="to-id" type="number" class="form-control"/>
                                </div>
                            </div>
                            <button id="add-edge-btn" class="btn btn-black">Add Edge</button>
                        </div>
                    </div>



                </div>

                <div class="tab-pane fade active justify-content-center" id="text-tab-pane" role="tabpanel" aria-labelledby="home-tab" tabindex="1">
                    <div class="d-flex flex-column">
                        <textarea id="json-input"></textarea>
                        <button id="submit-btn" class="btn btn-dark mt-2">Submit</button>
                    </div>
                </div>
            </div>


        </div>
    </div>
</div>
</body>
</html>
